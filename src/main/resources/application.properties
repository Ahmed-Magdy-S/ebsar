spring.application.name=analytics

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ebsar}
spring.datasource.username=${DB_USER:ebsar}
spring.datasource.password=${DB_PASSWORD:ebsar@123}

# Liquibase (Spring Boot defaults to this path; keeping explicit for clarity)
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ClickHouse
clickhouse.datasource.url=jdbc:ch://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:ebsar_analytics}
clickhouse.datasource.username=${CLICKHOUSE_USER:ebsar}
clickhouse.datasource.password=${CLICKHOUSE_PASSWORD:ebsar@123}
