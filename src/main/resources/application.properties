spring.application.name=analytics

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:analytics}
spring.datasource.username=${DB_USER:analytics}
spring.datasource.password=${DB_PASSWORD:analytics}

# Liquibase (Spring Boot defaults to this path; keeping explicit for clarity)
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
