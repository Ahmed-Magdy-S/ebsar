services:
  postgres_db:
    image: postgres:18.3
    container_name: ebsar-app-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ebsar
      POSTGRES_USER: ebsar
      POSTGRES_PASSWORD: ebsar@123

  clickhouse_db:
    image: clickhouse/clickhouse-server:25.3
    container_name: ebsar-app-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    environment:
      CLICKHOUSE_DB: ebsar_analytics
      CLICKHOUSE_USER: ebsar
      CLICKHOUSE_PASSWORD: ebsar@123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
